---
# files/credentials.yml
#
# Ordered list of credentials to try against EVERY device, first to last.
# The module stops at the first one that works (tried over each protocol
# in login_protocols before moving to the next credential).
#
# SECURITY: In real use, do NOT keep this file in plaintext. Encrypt it
# with ansible-vault, e.g.:
#     ansible-vault encrypt files/credentials.yml
# and run the playbook with --ask-vault-pass or --vault-password-file.
# This plaintext layout is shown only so the structure is clear.
#
# "label" is just a friendly name written to the CSV report so you know
# which account worked, without necessarily dumping the raw username if
# you choose to make label different from username.
#
# "secret" is the enable/privileged-mode password if different from the
# login password. Omit it (or leave null) if enable password == login
# password, or if the account already drops into privileged mode.

credential_list:
  - label: "svc-netadmin"
    username: "svc-netadmin"
    password: "{{ vault_svc_netadmin_password }}"
    secret: "{{ vault_svc_netadmin_enable | default(omit) }}"

  - label: "svc-netro"
    username: "svc-netro"
    password: "{{ vault_svc_netro_password }}"
    secret: null

  - label: "legacy-admin"
    username: "admin"
    password: "{{ vault_legacy_admin_password }}"
    secret: "{{ vault_legacy_enable_password }}"

  - label: "backup-local"
    username: "{{ vault_backup_local_username }}"
    password: "{{ vault_backup_local_password }}"
    secret: null
