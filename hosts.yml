---
# inventory/hosts.yml
#
# List every router/switch here. device_platform tells the module which
# Netmiko driver family to use as a base (it auto-adjusts for telnet).
# Common values: cisco_ios, cisco_xe, cisco_nxos, cisco_asa, cisco_xr
#
# device_port is optional — omit it to use the protocol default
# (22 for ssh, 23 for telnet). Set it explicitly if a device uses a
# non-standard port.

all:
  children:
    network_devices:
      hosts:
        core-sw01:
          ansible_host: 10.10.1.1
          device_platform: cisco_ios

        core-sw02:
          ansible_host: 10.10.1.2
          device_platform: cisco_ios

        dist-rtr01:
          ansible_host: 10.10.2.1
          device_platform: cisco_xe

        access-sw10:
          ansible_host: 10.10.5.10
          device_platform: cisco_ios

        nx-sw01:
          ansible_host: 10.10.9.5
          device_platform: cisco_nxos

        legacy-rtr-telnet-only:
          ansible_host: 10.10.3.50
          device_platform: cisco_ios
          # Force telnet only for a device with no SSH support:
          login_protocols:
            - telnet
