---
# files/secrets.yml  (ENCRYPT THIS FILE WITH ansible-vault)
#
# This is where the actual password strings live. Keep credentials.yml
# (the structure/labels) separate from this file (the secret values) so
# you can share credentials.yml structure freely while only this file
# needs vault protection.
#
# To create/encrypt:
#   ansible-vault create files/secrets.yml
# To edit later:
#   ansible-vault edit files/secrets.yml
#
# Example content (replace with real values, then encrypt):

vault_svc_netadmin_password: "ChangeMe123!"
vault_svc_netadmin_enable: "ChangeMeEnable123!"

vault_svc_netro_password: "ReadOnlyChangeMe456!"

vault_legacy_admin_password: "LegacyChangeMe789!"
vault_legacy_enable_password: "LegacyEnableChangeMe!"

vault_backup_local_username: "backupadmin"
vault_backup_local_password: "BackupChangeMe000!"
